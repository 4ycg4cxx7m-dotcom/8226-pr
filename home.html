<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>С 8 Марта! 💐✨</title>
    <style>
        :root {
            --pink: #ff69b4; --violet: #da70d6; --gold: #ffd700; --rose: #ff1493;
            --white: #fff; --shadow: 0 25px 50px rgba(255,105,180,0.4);
            --glow: 0 0 40px rgba(255,105,180,0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Georgia', serif; 
            background: linear-gradient(-45deg, var(--pink), var(--violet), var(--rose), var(--gold));
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh; overflow-x: hidden; 
            letter-spacing: -0.03em; position: relative;
        }
        
        /* Анимированный градиент */
        @keyframes gradientShift {
            0%,100%{background-position: 0% 50%;}
            50%{background-position: 100% 50%;}
        }
        
        /* Огромный заголовок на весь экран */
        .hero-section {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            position: relative; z-index: 10;
        }
        .main-title {
            color: var(--white); font-size: clamp(4em, 15vw, 12em);
            text-shadow: var(--glow), 0 0 80px var(--rose);
            animation: heroGlow 3s ease-in-out infinite alternate;
            line-height: 0.9; margin-bottom: 0;
            transform: translateY(0);
        }
        .main-subtitle {
            color: var(--white); font-size: clamp(2.2em, 8vw, 4.8em);
            text-shadow: 0 4px 25px rgba(0,0,0,0.5);
            margin-top: 15px; opacity: 0.95;
            animation: subtitleFloat 4s ease-in-out infinite;
            font-weight: bold;
        }
        @keyframes heroGlow {
            from { 
                text-shadow: var(--glow), 0 0 60px var(--pink), 0 0 100px var(--rose);
                transform: scale(1) rotateX(0deg);
            } 
            to { 
                text-shadow: 0 0 80px var(--gold), 0 0 120px var(--violet), 0 0 150px var(--rose);
                transform: scale(1.03) rotateX(2deg);
            } 
        }
        @keyframes subtitleFloat {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        /* Частицы фона */
        .bg-animation { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 1;
        }
        .heart { 
            position: absolute; font-size: 24px; color: var(--pink);
            animation: floatHeart 7s linear infinite; 
        }
        .confetti {
            position: absolute; width: 12px; height: 12px; background: var(--gold);
            border-radius: 50%; animation: confettiFall 9s linear infinite;
        }
        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 1; }
            100% { transform: translateY(-120px) rotate(360deg) scale(1.2); opacity: 0; }
        }
        @keyframes confettiFall {
            0% { transform: translateY(-120vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        
        /* Сетка пожеланий */
        .wishes-section {
            padding: 120px 20px 80px; position: relative; z-index: 5;
        }
        .wishes-title {
            text-align: center; color: var(--white);
            font-size: clamp(2em, 6vw, 3.5em); font-weight: bold;
            text-shadow: 0 8px 30px rgba(0,0,0,0.6), 0 0 40px var(--rose);
            margin-bottom: 50px; opacity: 0; transform: translateY(30px);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        .wishes-title.animate { opacity: 1; transform: translateY(0); }
        @keyframes titleGlow {
            from { text-shadow: 0 8px 30px rgba(0,0,0,0.6), 0 0 30px var(--pink); }
            to { text-shadow: 0 8px 30px rgba(0,0,0,0.6), 0 0 50px var(--gold), 0 0 70px var(--rose); }
        }
        
        .tiles-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; 
            max-width: 1100px; margin: 0 auto; padding: 0 20px;
            opacity: 0; transform: translateY(50px);
            transition: all 1s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .tiles-grid.animate {
            opacity: 1; transform: translateY(0);
        }
        .tile { 
            aspect-ratio: 1; background: rgba(255,255,255,0.97); 
            border-radius: 35px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-decoration: none;
            color: var(--violet); font-size: clamp(1.6em, 5.5vw, 2.2em); 
            font-weight: bold; box-shadow: var(--shadow); 
            transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
            position: relative; overflow: hidden; line-height: 1.2; 
            padding: 25px; border: 3px solid rgba(255,255,255,0.4);
            opacity: 0; transform: translateY(30px);
        }
        .tile.animate { opacity: 1; transform: translateY(0); }
        .tile:nth-child(1).animate { transition-delay: 0.05s; }
        .tile:nth-child(2).animate { transition-delay: 0.10s; }
        .tile:nth-child(3).animate { transition-delay: 0.15s; }
        .tile:nth-child(4).animate { transition-delay: 0.20s; }
        .tile:nth-child(5).animate { transition-delay: 0.25s; }
        .tile:nth-child(6).animate { transition-delay: 0.30s; }
        .tile:nth-child(7).animate { transition-delay: 0.35s; }
        .tile:nth-child(8).animate { transition-delay: 0.40s; }
        .tile:nth-child(9).animate { transition-delay: 0.45s; }
        
        .tile::before { 
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; 
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transition: left 0.8s; 
        }
        .tile:hover { 
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 30px 60px rgba(255,105,180,0.6);
            background: linear-gradient(135deg, var(--pink), var(--violet), var(--rose));
            color: white; border-color: rgba(255,255,255,0.9);
        }
        .tile:hover::before { left: 100%; }
        .tile .emoji { font-size: 2.5em; margin-bottom: 8px; }
        .tile .text { 
            font-size: 1.2em; 
            letter-spacing: -0.02em; 
        }
        /* ✅ Вдохновение +0.4em (было 0.5em, стало 0.9em) */
        .tile[href="warmth"] .text {
            font-size: 0.9em;
        }
        
        /* МОБИЛЬНАЯ ВЕРСИЯ */
        @media (max-width: 768px) {
            .hero-section {
                height: 100vh; padding: 0 20px;
            }
            .main-title {
                font-size: clamp(5em, 18vw, 10em); line-height: 0.85;
                text-shadow: 0 10px 40px rgba(0,0,0,0.6);
            }
            .main-subtitle {
                font-size: clamp(2.5em, 10vw, 5.5em);
            }
            
            .wishes-section { padding: 100px 15px 60px; }
            .wishes-title {
                font-size: clamp(2.2em, 9vw, 4em); margin-bottom: 40px;
            }
            .tiles-grid { 
                grid-template-columns: 1fr; gap: 25px; 
                max-width: 380px; margin: 0 auto;
            }
            .tile { 
                aspect-ratio: 1.2; border-radius: 30px; padding: 35px 20px;
                font-size: clamp(2.2em, 9vw, 3em);
                box-shadow: 0 25px 55px rgba(255,105,180,0.65);
            }
            .tile .emoji { font-size: 3.5em; }
            .tile .text { font-size: 1.4em; }
            /* ✅ Вдохновение на мобиле +0.4em (было 0.7em, стало 1.1em) */
            .tile[href="warmth"] .text {
                font-size: 1.1em;
            }
            
            .tile:hover { 
                transform: translateY(-5px) scale(1.015);
                box-shadow: 0 25px 55px rgba(255,105,180,0.65);
            }
        }
        
        /* Таблетки */
        @media (min-width: 769px) and (max-width: 1024px) {
            .tiles-grid { grid-template-columns: repeat(2, 1fr); gap: 25px; max-width: 800px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>
    
    <!-- Гигантский заголовок на весь экран -->
    <section class="hero-section">
        <h1 class="main-title">С 8 Марта</h1>
        <p class="main-subtitle">наши дорогие! 💐💖✨</p>
    </section>
    
    <!-- Секция с пожеланиями -->
    <section class="wishes-section">
        <h2 class="wishes-title" id="wishesTitle">ХОЧУ ПОЖЕЛАТЬ ВАМ:</h2>
        <div class="tiles-grid" id="tilesGrid">
            <a href="love" class="tile">
                <span class="emoji">💝</span>
                <span class="text">Любви</span>
            </a>
            <a href="happiness" class="tile">
                <span class="emoji">😊</span>
                <span class="text">Счастья</span>
            </a>
            <a href="beauty" class="tile">
                <span class="emoji">🌸</span>
                <span class="text">Красоты</span>
            </a>
            <a href="health" class="tile">
                <span class="emoji">💕</span>
                <span class="text">Здоровья</span>
            </a>
            <a href="success" class="tile">
                <span class="emoji">⭐</span>
                <span class="text">Успеха</span>
            </a>
            <a href="dreams" class="tile">
                <span class="emoji">✨</span>
                <span class="text">Улыбок</span>
            </a>
            <a href="smiles" class="tile">
                <span class="emoji">😂</span>
                <span class="text">Тепла</span>
            </a>
            <a href="warmth" class="tile">
                <span class="emoji">🏡</span>
                <span class="text">Вдохновения</span>
            </a>
            <a href="inspiration" class="tile">
                <span class="emoji">🌟</span>
                <span class="text">Побед</span>
            </a>
        </div>
    </section>
    
    <script>
        // Частицы
        function createParticles() {
            const bg = document.getElementById('bgAnimation');
            for(let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = ['💖','💕','💗','🌸','✨','🌺'][Math.floor(Math.random()*6)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDuration = (Math.random()*4 + 5) + 's';
                    bg.appendChild(heart);

                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = ['#ffd700', '#ff69b4', '#da70d6', '#ff1493'][Math.floor(Math.random()*4)];
                    confetti.style.animationDuration = (Math.random()*5 + 6) + 's';
                    bg.appendChild(confetti);
                    
                    setTimeout(() => { heart.remove(); confetti.remove(); }, 9000);
                }, i * 200);
            }
        }
        createParticles();
        setInterval(createParticles, 4000);

        // Анимация при скролле
        function animateOnScroll() {
            const wishesTitle = document.getElementById('wishesTitle');
            const tilesGrid = document.getElementById('tilesGrid');
            const tiles = document.querySelectorAll('.tile');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        if (entry.target === wishesTitle) {
                            wishesTitle.classList.add('animate');
                        } else if (entry.target === tilesGrid) {
                            tilesGrid.classList.add('animate');
                            tiles.forEach((tile, i) => {
                                setTimeout(() => tile.classList.add('animate'), i * 70 + 150);
                            });
                        }
                        observer.unobserve(entry.target);
                    }
                });
            });
            
            observer.observe(wishesTitle);
            observer.observe(tilesGrid);
        }
        animateOnScroll();
    </script>
</body>
</html>
